<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAI · 移动电商兴趣意图 Agent</title>
<style>
  :root{
    --brand:#e8384f; --brand-2:#ff6a7d; --brand-soft:#ffeef0;
    --bg:#e9ebf2; --screen:#f6f7fb; --panel:#ffffff; --ink:#1a1d29;
    --muted:#8a8f9c; --line:#eef0f4; --warn:#ff9500; --good:#22c55e;
    --dark:#10131f; --dark-2:#1a1e30; --dark-line:#2a2e45;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;
  }
  /* ---------- stage ---------- */
  .stage{display:flex;gap:26px;justify-content:center;align-items:flex-start;padding:28px 22px;flex-wrap:wrap}
  .col-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .col-label .dot{width:7px;height:7px;border-radius:50%;background:var(--brand)}
  /* ---------- phone ---------- */
  .phone-wrap{display:flex;flex-direction:column}
  .phone{
    width:390px;height:780px;background:#0b0d16;border-radius:46px;padding:12px;
    box-shadow:0 30px 70px rgba(16,19,31,.30),0 6px 16px rgba(16,19,31,.18);position:relative;
  }
  .phone .notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:118px;height:28px;
    background:#0b0d16;border-radius:0 0 18px 18px;z-index:60}
  .screen{
    width:100%;height:100%;border-radius:36px;overflow:hidden;background:var(--screen);position:relative;
    display:flex;flex-direction:column;
  }
  /* status bar */
  .statusbar{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 24px 0 26px;
    font-size:13px;font-weight:700;flex:0 0 auto;color:#000}
  .statusbar .sb-r{display:flex;gap:5px;align-items:center;font-size:11px}
  /* app header */
  .apphead{flex:0 0 auto;padding:6px 14px 10px;display:flex;align-items:center;gap:9px;background:var(--screen)}
  .apphead .loc{font-size:12px;font-weight:700;line-height:1.1;max-width:64px}
  .apphead .loc small{display:block;font-size:9px;color:var(--muted);font-weight:500}
  .search{flex:1;position:relative}
  .search input{width:100%;height:34px;border:none;border-radius:17px;background:#fff;
    padding:0 12px 0 32px;font-size:12px;outline:none;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .search .ic{position:absolute;left:11px;top:9px;font-size:13px}
  .search .go{position:absolute;right:4px;top:4px;height:26px;border:none;border-radius:13px;
    background:linear-gradient(90deg,var(--brand),var(--brand-2));color:#fff;font-size:11px;font-weight:700;padding:0 12px}
  .head-ico{width:34px;text-align:center;font-size:18px;cursor:pointer}
  /* scroll body */
  .body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .body::-webkit-scrollbar{width:0}
  /* category chips */
  .chips{display:flex;gap:8px;padding:10px 14px 4px;overflow-x:auto}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;padding:6px 14px;border-radius:16px;background:#fff;font-size:12px;font-weight:600;
    color:#444;box-shadow:0 1px 2px rgba(0,0,0,.04);cursor:pointer;transition:.12s}
  .chip.active{background:linear-gradient(90deg,var(--brand),var(--brand-2));color:#fff}
  /* banner */
  .banner{margin:8px 14px 6px;border-radius:14px;height:96px;padding:16px 18px;color:#fff;position:relative;
    background:linear-gradient(120deg,#e8384f,#ff6a7d 70%,#ff9a8b);overflow:hidden}
  .banner h3{font-size:16px;font-weight:800}
  .banner p{font-size:11px;opacity:.92;margin-top:3px}
  .banner .deco{position:absolute;right:-10px;bottom:-14px;font-size:74px;opacity:.5;transform:rotate(-12deg)}
  /* quick entries */
  .quick{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;padding:6px 14px 10px;text-align:center}
  .quick .q{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .quick .q .ic{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:19px;color:#fff}
  .quick .q span{font-size:10px;color:#555}
  /* feed */
  .feed-head{display:flex;justify-content:space-between;align-items:center;padding:6px 14px 8px}
  .feed-head h4{font-size:14px;font-weight:800}
  .feed-head .sort{font-size:11px;color:var(--muted);display:flex;gap:8px}
  .feed-head .sort b{cursor:pointer;font-weight:600;color:#333}
  .feed-head .sort b.on{color:var(--brand)}
  .feed{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 12px 16px}
  .pcard{background:#fff;border-radius:14px;overflow:hidden;cursor:pointer;transition:.12s;position:relative}
  .pcard:active{transform:scale(.985)}
  .pcard .thumb{height:158px;display:grid;place-items:center;font-size:52px;position:relative}
  .pcard .disc{position:absolute;top:6px;left:6px;background:var(--brand);color:#fff;font-size:9px;font-weight:800;
    padding:2px 6px;border-radius:5px}
  .pcard .fav{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.92);
    border:none;display:grid;place-items:center;font-size:12px;cursor:pointer}
  .pcard .info{padding:7px 9px 9px}
  .pcard .name{font-size:12.5px;font-weight:600;line-height:1.3;height:32px;overflow:hidden;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical}
  .pcard .price{display:flex;align-items:baseline;gap:5px;margin-top:5px}
  .pcard .price .now{color:var(--brand);font-weight:800;font-size:15px}
  .pcard .price .old{font-size:10px;color:var(--muted);text-decoration:line-through}
  .pcard .meta{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)}
  /* tab bar */
  .tabbar{flex:0 0 auto;height:58px;background:#fff;border-top:1px solid var(--line);display:flex;
    justify-content:space-around;align-items:center;padding-bottom:4px}
  .tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);cursor:pointer;flex:1}
  .tab .ti{font-size:18px}
  .tab.active{color:var(--brand)}
  .tab.cart{position:relative}
  .tab.cart .badge{position:absolute;top:-2px;right:14px;background:var(--brand);color:#fff;font-size:9px;
    min-width:15px;height:15px;border-radius:8px;display:grid;place-items:center;padding:0 3px}
  /* bottom sheets (detail / cart) */
  .sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;z-index:50;
    transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);max-height:88%;overflow:hidden;
    display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.2)}
  .sheet.show{transform:translateY(0)}
  .sheet .grip{width:36px;height:4px;border-radius:2px;background:#dcdde3;margin:8px auto 0}
  .sheet .sbody{overflow-y:auto;padding:0 16px 20px}
  .detail .dhead{height:200px;display:grid;place-items:center;font-size:80px;position:relative}
  .detail .dclose{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;border:none;
    background:rgba(0,0,0,.06);font-size:15px;cursor:pointer}
  .detail .dcat{font-size:10px;color:var(--brand);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:14px}
  .detail h2{font-size:17px;margin:4px 0 8px;font-weight:800;line-height:1.3}
  .detail .dp{display:flex;align-items:baseline;gap:8px}
  .detail .dp .now{font-size:24px;font-weight:800;color:var(--brand)}
  .detail .dp .old{font-size:13px;color:var(--muted);text-decoration:line-through}
  .detail .dtags{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0}
  .detail .dtags span{font-size:10px;background:var(--brand-soft);color:var(--brand);padding:3px 9px;border-radius:7px;font-weight:600}
  .detail .ddesc{font-size:12px;color:var(--muted);line-height:1.6;background:var(--screen);padding:10px 12px;border-radius:12px}
  .detail .dnote{font-size:11px;color:var(--brand);margin:12px 0;font-weight:600}
  .detail .dfoot{position:sticky;bottom:0;background:#fff;padding:12px 0 4px;display:flex;gap:10px;border-top:1px solid var(--line)}
  .detail .dfoot .btn{flex:1;height:42px;border:none;border-radius:21px;font-weight:700;font-size:13px;cursor:pointer}
  .btn-ghost{background:var(--brand-soft);color:var(--brand)}
  .btn-ghost.on{background:#ffe1e6}
  .btn-primary{background:linear-gradient(90deg,var(--brand),var(--brand-2));color:#fff}
  /* cart sheet */
  .cart-sheet .shead{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px}
  .cart-sheet .shead h3{font-size:16px;font-weight:800}
  .cart-sheet .shead .clr{font-size:12px;color:var(--muted);cursor:pointer}
  .citem{display:flex;gap:11px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .citem .ct{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;font-size:22px;flex:0 0 46px}
  .citem .ci{flex:1;min-width:0}
  .citem .ci h6{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .citem .ci .cp{font-size:11px;color:var(--muted)}
  .citem .cr{font-size:18px;color:var(--muted);cursor:pointer}
  .cart-empty{text-align:center;color:var(--muted);padding:50px 0;font-size:13px}
  .cart-foot{padding:12px 16px 16px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .cart-foot .tot{flex:1}
  .cart-foot .tot small{display:block;font-size:10px;color:var(--muted)}
  .cart-foot .tot b{font-size:20px;color:var(--brand)}
  .cart-foot .btn{padding:0 26px;height:44px;border:none;border-radius:22px;font-weight:700;font-size:14px;
    background:linear-gradient(90deg,var(--brand),var(--brand-2));color:#fff;cursor:pointer}
  /* toast */
  .toast{position:absolute;left:50%;bottom:74px;transform:translateX(-50%) translateY(20px);background:rgba(20,23,33,.92);
    color:#fff;font-size:12px;padding:8px 16px;border-radius:20px;z-index:80;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---------- agent ---------- */
  .agent-wrap{display:flex;flex-direction:column;width:380px;max-width:94vw}
  .agent .acard{background:var(--dark);color:#e7e8f5;border-radius:18px;padding:15px;margin-bottom:13px;
    border:1px solid var(--dark-line);box-shadow:0 12px 30px rgba(16,19,31,.16)}
  .agent .acard.light{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .a-head{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    color:#9a9dc0;margin-bottom:11px}
  .a-head.light{color:var(--muted)}
  .a-head .pulse{width:8px;height:8px;border-radius:50%;background:var(--good);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .intent-main{display:flex;align-items:baseline;gap:9px}
  .intent-main .lbl{font-size:23px;font-weight:800;color:#fff}
  .intent-main .icon{font-size:21px}
  .intent-conf{font-size:11.5px;color:#a9acd0;margin-top:4px}
  .bar-track{height:7px;border-radius:4px;background:#2a2e4a;margin:9px 0 12px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--brand-2));transition:width .5s}
  .intent-row{display:flex;justify-content:space-between;font-size:11.5px;margin:4px 0;color:#c7c9e6}
  .intent-row .v{font-weight:700}
  .ibar{margin-bottom:8px}
  .ibar .top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:3px}
  .ibar .top .nm{font-weight:700}
  .ibar .top .pc{color:var(--muted)}
  .ibar .track{height:6px;background:#eef0f6;border-radius:4px;overflow:hidden}
  .ibar .fill{height:100%;border-radius:4px;transition:width .5s}
  .empty-mini{color:var(--muted);font-size:12px;font-style:italic}
  .stream{max-height:170px;overflow-y:auto;font-family:ui-monospace,Menlo,monospace;font-size:10.5px;line-height:1.7}
  .stream::-webkit-scrollbar{width:5px}.stream::-webkit-scrollbar-thumb{background:#3a3e5e;border-radius:3px}
  .stream .line{display:flex;gap:7px;opacity:0;transform:translateY(4px);animation:slidein .3s forwards}
  @keyframes slidein{to{opacity:1;transform:none}}
  .stream .t{color:#6c6f96;flex:0 0 40px}
  .stream .tag{font-size:8.5px;padding:1px 5px;border-radius:4px;font-weight:800;flex:0 0 auto;align-self:center}
  .tag-act{background:#2a3b2a;color:#7ee07e}.tag-inf{background:#3a2a4a;color:#c79ee0}.tag-rec{background:#2a334a;color:#7eaaff}
  .stream .msg{color:#cdd0ec;flex:1}
  .recs{display:flex;flex-direction:column;gap:8px}
  .rec{display:flex;gap:10px;align-items:center;padding:8px;border:1px solid var(--line);border-radius:11px;cursor:pointer;transition:.12s}
  .rec:hover{border-color:var(--brand);box-shadow:0 6px 16px rgba(232,56,79,.10)}
  .rec .rt{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;flex:0 0 40px}
  .rec .rb{flex:1;min-width:0}
  .rec .rb h5{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec .rb .why{font-size:10px;color:var(--brand);font-weight:600;margin-top:1px}
  .rec .rp{font-weight:800;font-size:13px;color:var(--brand);flex:0 0 auto}
  /* scrim / sheetbar / continue / dual-interest */
  .scrim{position:absolute;inset:0;background:rgba(16,19,31,0);z-index:45;pointer-events:none;transition:background .25s}
  .scrim.show{background:rgba(16,19,31,.34);pointer-events:auto}
  .sheet .grip{cursor:pointer}
  .sheetbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px}
  .sheetbar .back,.sheetbar .sclose{width:30px;height:30px;border-radius:50%;border:none;background:#f1f2f6;font-size:16px;cursor:pointer;line-height:1}
  .sheetbar .stitle{font-size:14px;font-weight:800}
  .btn-continue{width:100%;height:38px;border:1px solid var(--line);background:#fff;border-radius:19px;font-size:12px;font-weight:700;color:#555;cursor:pointer;margin:10px 0 8px}
  .btn-continue:hover{border-color:var(--brand);color:var(--brand)}
  .ihdr{display:flex;align-items:center;justify-content:space-between;margin:2px 0 6px}
  .ihdr:first-child{margin-top:0}
  .ihdr .ttl{font-size:12px;font-weight:800}
  .ihdr .badge{font-size:9px;padding:2px 7px;border-radius:5px;font-weight:700}
  .badge.short{background:#fff1f2;color:var(--brand)}
  .badge.long{background:#eef0ff;color:#6d5efc}
  .isection{margin-bottom:12px}
  .isection:last-child{margin-bottom:0}
  .drift{font-size:11px;color:var(--muted);background:var(--screen);border:1px dashed #d7dae5;padding:8px 10px;border-radius:10px;margin-top:4px}
  .drift b{color:var(--ink)}
  /* small screen: stack, phone scales down */
  @media(max-width:880px){
    .phone{transform:scale(.86);transform-origin:top center;margin-bottom:-90px}
  }
</style>
</head>
<body>

<div class="stage">
  <!-- LEFT: phone -->
  <div class="phone-wrap">
    <div class="col-label"><span class="dot"></span>移动电商 App · 用户端</div>
    <div class="phone">
      <div class="notch"></div>
      <div class="screen">
        <div class="statusbar">
          <span>9:41</span>
          <span class="sb-r">📶 <b>5G</b> 🔋</span>
        </div>
        <div class="apphead">
          <div class="loc">📍 北京<small>推荐自提点</small></div>
          <div class="search">
            <span class="ic">🔍</span>
            <input id="search" type="text" placeholder="搜索商品 / 品类 / 关键词">
            <button class="go" onclick="doSearch()">搜索</button>
          </div>
          <div class="head-ico" onclick="openCart()">🛍️</div>
        </div>
        <div class="body" id="body">
          <div class="chips" id="chips"></div>
          <div class="banner">
            <h3>限时秒杀</h3>
            <p>数码好物直降 · Agent 实时识别你的兴趣</p>
            <span class="deco">🎁</span>
          </div>
          <div class="quick" id="quick"></div>
          <div class="feed-head">
            <h4>为你推荐</h4>
            <div class="sort" id="sort">
              <b class="on" data-s="default" onclick="setSort('default',this)">综合</b>
              <b data-s="price-asc" onclick="setSort('price-asc',this)">价格</b>
              <b data-s="rating" onclick="setSort('rating',this)">评分</b>
              <b data-s="discount" onclick="setSort('discount',this)">折扣</b>
            </div>
          </div>
          <div class="feed" id="feed"></div>
        </div>
        <div class="tabbar">
          <div class="tab active" onclick="goHome()"><span class="ti">🏠</span>首页</div>
          <div class="tab" onclick="toast('分类导航')"><span class="ti">🧩</span>分类</div>
          <div class="tab cart" onclick="openCart()"><span class="ti">🛒</span>购物车<span class="badge" id="cartBadge">0</span></div>
          <div class="tab" onclick="toast('消息中心')"><span class="ti">💬</span>消息</div>
          <div class="tab" onclick="toast('我的')"><span class="ti">👤</span>我的</div>
        </div>

        <div class="scrim" id="scrim" onclick="closeSheets()"></div>
        <!-- detail sheet -->
        <div class="sheet detail" id="detailSheet"></div>
        <!-- cart sheet -->
        <div class="sheet cart-sheet" id="cartSheet">
          <div class="grip" onclick="closeCart()"></div>
          <div class="shead"><h3>🛒 购物车</h3><span class="clr"><span onclick="closeCart()" style="margin-right:12px">继续购物</span><span onclick="clearCart()">清空</span></span></div>
          <div class="sbody" id="cartBody"></div>
          <div class="cart-foot"><div class="tot"><small>合计（不含运费）</small><b id="cartTotal">¥0</b></div>
            <button class="btn" onclick="checkout()">去结算</button></div>
        </div>
        <div class="toast" id="toast"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: agent -->
  <div class="agent-wrap">
    <div class="col-label"><span class="dot" style="background:var(--brand)"></span>兴趣意图 Agent · 实时分析</div>
    <div class="agent">
      <div class="acard">
        <div class="a-head"><span class="pulse"></span>意图判断 · LIVE</div>
        <div class="intent-main"><span class="icon" id="iIcon">🧭</span><span class="lbl" id="iLabel">观望中</span></div>
        <div class="intent-conf" id="iConf">置信度 —</div>
        <div class="bar-track"><div class="bar-fill" id="iBar" style="width:0"></div></div>
        <div id="iBreakdown"></div>
      </div>
      <div class="acard light">
        <div class="a-head light">兴趣倾向 · 短期 / 长期</div>
        <div id="interests"><p class="empty-mini">还没有行为数据，在左侧手机上逛逛吧～</p></div>
      </div>
      <div class="acard">
        <div class="a-head">Agent 思考流</div>
        <div class="stream" id="stream"></div>
      </div>
      <div class="acard light">
        <div class="a-head light">为你推荐 · 自适应</div>
        <div class="recs" id="recs"><p class="empty-mini">浏览几件商品后，推荐将根据你的兴趣生成。</p></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   1. 商品数据模型  (可替换为截图中的真实商品)
   ============================================================ */
const CATALOG = [
  {id:1, name:"主动降噪无线耳机",cat:"数码",price:899,old:1099,rating:4.8,emoji:"🎧",disc:true,grad:["#6d5efc","#8b7bff"],tags:["降噪","蓝牙5.3","长续航","通勤"]},
  {id:2, name:"多功能运动智能手表",cat:"数码",price:1299,old:null,rating:4.6,emoji:"⌚",disc:false,grad:["#3b82f6","#60a5fa"],tags:["心率","血氧","50m防水"]},

/* ============================================================
   2. 状态 & 事件追踪
   ============================================================ */
const state = {events:[],cart:new Set(),favs:new Set(),filter:"推荐",sort:"default",search:"",openId:null,sheet:null};
const WEIGHTS = {hover:0.5, view:1, search:2.5, detail:3.2, fav:4.2, cart:5.5, removeCart:-2.5, purchase:10, filter:1.5, sort:0.8};
function log(type, productId=null, meta={}){
  const p = productId!=null ? CATALOG.find(x=>x.id===productId) : null;
  state.events.push({type, productId, cat:p?p.cat:null, price:p?p.price:null, disc:p?p.disc:false, ts:Date.now(), meta});
}

/* ============================================================
   3. 兴趣引擎 —— 衰减加权打分
   ============================================================ */
const SHORT_HL=25000;   // 短期：25s 半衰期，反映"当下"偏好
const LONG_HL=600000;    // 长期：10min 半衰期，反映"稳定"偏好
function decayed(now,ts,hl){ return Math.pow(0.5,(now-ts)/hl); }
function computeInterests(now=Date.now(), hl=SHORT_HL){
  const scores={};
  for(const e of state.events){
    if(!e.cat) continue;
    const w=WEIGHTS[e.type]||0; if(!w) continue;
    scores[e.cat]=(scores[e.cat]||0)+w*decayed(now,e.ts,hl);
  }
  const total=Object.values(scores).reduce((a,b)=>a+b,0)||1;
  const arr=Object.entries(scores).map(([cat,s])=>({cat,score:s,pct:s/total*100})).sort((a,b)=>b.score-a.score);
  return {arr,total};
}

/* ============================================================
   4. 意图推断引擎
   ============================================================ */
const INTENTS = {
  exploring:{label:"广泛浏览",icon:"🧭",desc:"在多个品类间泛泛浏览，尚未聚焦"},
  comparing:{label:"对比决策",icon:"⚖️",desc:"在同类商品间反复比较，接近决策"},
  buying:{label:"强购买意图",icon:"🎯",desc:"加购/收藏集中，进入购买链路"},
  deal:{label:"价格敏感",icon:"🏷️",desc:"关注折扣与低价位，追求性价比"},
};
function inferIntent(now=Date.now()){
  const recent=state.events.filter(e=>now-e.ts<120000);
  const all=state.events;
  const f={
    total:all.length,
    distinctCats:new Set(all.map(e=>e.cat).filter(Boolean)).size,
    recentN:recent.length,
    recentCats:new Set(recent.map(e=>e.cat).filter(Boolean)).size,
    detailAll:all.filter(e=>e.type==='detail').length,
    detailRecent:recent.filter(e=>e.type==='detail').length,
    carts:all.filter(e=>e.type==='cart').length,
    favs:all.filter(e=>e.type==='fav').length,
    searches:all.filter(e=>e.type==='search').length,
    discTouches:all.filter(e=>(e.disc||e.meta.disc)).length,
    priceSort:all.filter(e=>e.meta.sort&&e.meta.sort.startsWith('price')).length,
    lowPriceFocus:all.filter(e=>e.price&&e.price<150).length/(all.filter(e=>e.price).length||1),
  };
  const detailCats=recent.filter(e=>e.type==='detail').map(e=>e.cat).filter(Boolean);
  const cc={};detailCats.forEach(c=>cc[c]=(cc[c]||0)+1);
  const maxSameCatDetail=Math.max(0,...Object.values(cc));
  const s={exploring:0,comparing:0,buying:0,deal:0};
  s.exploring+=Math.min(f.total*1.5,16)+f.distinctCats*3-f.carts*4;
  if(f.recentCats>=3) s.exploring+=6;
  s.comparing+=maxSameCatDetail*5+(f.detailRecent>=2?(f.detailRecent-1)*3:0);
  if(f.recentCats<=2&&f.detailRecent>=2) s.comparing+=5;
  s.buying+=f.carts*6+f.favs*3+Math.min(f.searches*2,8);
  if(f.carts>=1&&f.detailRecent>=1) s.buying+=5;
  s.deal+=f.discTouches*2.5+f.priceSort*4+f.lowPriceFocus*8;
  if(f.discTouches>=2) s.deal+=4;
  for(const k in s) s[k]=Math.max(0,s[k]);
  const tot=Object.values(s).reduce((a,b)=>a+b,0)||1;
  const norm={};for(const k in s) norm[k]=s[k]/tot*100;
  const ranked=Object.entries(norm).sort((a,b)=>b[1]-a[1]);
  const [topKey,topPct]=ranked[0];
  const conf=Math.min(95,30+topPct*0.6+f.total*0.8);
  return {topKey,topPct,conf,norm,maxSameCatDetail};
}

/* ============================================================
   5. 推荐生成
   ============================================================ */
function buildRecs(interests){
  if(interests.total<4) return [];
  const topCats=interests.arr.slice(0,2).map(x=>x.cat);
  const exclude=new Set([...state.cart,...state.favs]);
  let pool=CATALOG.filter(p=>!exclude.has(p.id)).map(p=>{
    let sc=0;const idx=topCats.indexOf(p.cat);
    if(idx===0) sc+=10;else if(idx===1) sc+=5;
    sc+=p.rating*0.5;if(p.disc) sc+=1.5;
    const it=inferIntent();if(it.topKey==='deal'&&p.price<200) sc+=4;
    return {p,sc};
  }).sort((a,b)=>b.sc-a.sc);
  return pool.slice(0,4).map(x=>x.p);
}
function recWhy(p){
  const it=inferIntent();
  if(it.topKey==='deal'&&p.disc) return "限时折扣 · 契合性价比偏好";
  if(it.topKey==='buying') return "加入购买链路的相关好物";
  if(it.topKey==='comparing') return "同类高评分 · 可继续对比";
  return "基于你最近的「"+p.cat+"」兴趣";
}

function interestBlock(data,title,cls){
  const tag=cls==='short'?'实时':'稳定';
  if(!data.arr.length) return `<div class="isection"><div class="ihdr"><span class="ttl">${title}</span><span class="badge ${cls}">${tag}</span></div><p class="empty-mini">暂无</p></div>`;

function driftLine(shTop,loTop){
  if(!shTop||!loTop) return '';
  if(shTop===loTop) return `<div class="drift">✓ 短期与长期偏好一致：<b>${shTop}</b></div>`;
  return `<div class="drift">↪ 短期正转向 <b>${shTop}</b>，长期偏好仍为 <b>${loTop}</b></div>`;
}
function renderAgent(){
  const now=Date.now();
  const it=inferIntent(now);
  const sh=computeInterests(now,SHORT_HL);
  const lo=computeInterests(now,LONG_HL);
  const I=INTENTS[it.topKey];
  document.getElementById('iIcon').textContent=I.icon;
  document.getElementById('iLabel').textContent=I.label;
  document.getElementById('iConf').textContent=`置信度 ${it.conf.toFixed(0)}% · ${I.desc}`;
  document.getElementById('iBar').style.width=it.conf+'%';
  document.getElementById('iBreakdown').innerHTML=Object.entries(it.norm).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
    `<div class="intent-row"><span>${INTENTS[k].icon} ${INTENTS[k].label}</span><span class="v">${v.toFixed(0)}%</span></div>`).join('');
  const ib=document.getElementById('interests');
  const shTop=sh.arr[0]&&sh.arr[0].cat, loTop=lo.arr[0]&&lo.arr[0].cat;
  ib.innerHTML = (sh.arr.length||lo.arr.length)
    ? interestBlock(sh,'⚡ 短期兴趣','short')+interestBlock(lo,'🏆 长期兴趣','long')+driftLine(shTop,loTop)

}

/* ============================================================
   8. Agent 思考流
   ============================================================ */
function pushThought(msg,kind='act'){
  const tm={act:['ACT','tag-act'],inf:['INF','tag-inf'],rec:['REC','tag-rec']};
  const [tag,cls]=tm[kind]||tm.act;
  const d=new Date();
  const t=String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  const el=document.createElement('div');el.className='line';
  el.innerHTML=`<span class="t">${t}</span><span class="tag ${cls}">${tag}</span><span class="msg">${msg}</span>`;
  const s=document.getElementById('stream');s.appendChild(el);s.scrollTop=s.scrollHeight;
  while(s.children.length>70) s.removeChild(s.firstChild);
}
function noteEvent(e){
  const p=e.productId!=null?CATALOG.find(x=>x.id===e.productId):null;let m='';
  switch(e.type){
    case 'hover':m=`瞥见「${p.name}」· ${e.cat} +${WEIGHTS.hover}`;break;
    case 'view':m=`浏览卡片「${p.name}」`;break;
    case 'search':m=`搜索「${e.meta.q}」`;break;
    case 'filter':m=`筛选品类：${e.meta.cat}`;break;
    case 'sort':m=`排序：${e.meta.sort}`;break;
    case 'detail':m=`查看详情「${p.name}」· ${e.cat} +${WEIGHTS.detail}`;break;
    case 'fav':m=`❤️ 收藏「${p.name}」· 强意图 +${WEIGHTS.fav}`;break;
    case 'cart':m=`🛒 加购「${p.name}」· 购买意图 +${WEIGHTS.cart}`;break;
    case 'removeCart':m=`移出购物车「${p.name}」`;break;
    case 'purchase':m=`💳 下单「${p.name}」`;break;
  }
  if(m) pushThought(m,'act');
}
let lastIntent=null,lastShort=null,lastLong=null;
function noteInference(){
  const now=Date.now();
  const sh=computeInterests(now,SHORT_HL), lo=computeInterests(now,LONG_HL);
  const shTop=sh.arr[0]&&sh.arr[0].cat, loTop=lo.arr[0]&&lo.arr[0].cat;
  if(shTop&&shTop!==lastShort){ lastShort=shTop; pushThought(`短期兴趣峰值 → ${shTop}`,'inf'); }
  if(loTop&&loTop!==lastLong){ lastLong=loTop; pushThought(`长期偏好确立 → ${loTop}（稳定兴趣）`,'inf'); }
  const it=inferIntent(now);
  if(it.topKey!==lastIntent){ lastIntent=it.topKey; const I=INTENTS[it.topKey];
    pushThought(`意图转向 → ${I.icon} ${I.label}（置信 ${it.conf.toFixed(0)}%）。${I.desc}`,'inf'); }
}

function peek(id){
  if(state.openId===id) return;
  clearTimeout(peekTimer);
  peekTimer=setTimeout(()=>{log('hover',id);noteEvent(state.events[state.events.length-1]);renderAgent();noteInference();},700);
}

  noteEvent(state.events[state.events.length-1]);renderAgent();noteInference();

}
function setSort(s,el){
  state.sort=s;log('sort',null,{sort:s});
  document.querySelectorAll('#sort b').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  renderFeed();noteEvent(state.events[state.events.length-1]);renderAgent();noteInference();
}
function updateSheets(){
  document.getElementById('detailSheet').classList.toggle('show', state.sheet==='detail');
  document.getElementById('cartSheet').classList.toggle('show', state.sheet==='cart');
  document.getElementById('scrim').classList.toggle('show', state.sheet!=null);
}
function closeSheets(){ state.sheet=null; state.openId=null; updateSheets(); }
function goHome(){ closeSheets(); state.filter='推荐'; state.search=''; const s=document.getElementById('search'); if(s)s.value=''; renderChips();renderFeed(); document.getElementById('body').scrollTo({top:0,behavior:'smooth'}); toast('已回到首页'); }
function openDetail(id){
  if(state.sheet==='cart') state.sheet=null;
  state.openId=id; state.sheet='detail';
  log('view',id);log('detail',id);
  const p=CATALOG.find(x=>x.id===id);
  noteEvent({type:'view',productId:id,cat:p.cat});
  noteEvent({type:'detail',productId:id,cat:p.cat});
  renderDetail(p);updateSheets();
  renderAgent();noteInference();
}
function closeDetail(){ if(state.sheet==='detail'){ state.sheet=null; state.openId=null; updateSheets(); } }
function toggleFav(ev,id){
  ev.stopPropagation();
  if(state.favs.has(id)){state.favs.delete(id);toast('已取消收藏');}
  else{state.favs.add(id);log('fav',id);noteEvent(state.events[state.events.length-1]);toast('❤️ 已收藏');}
  renderFeed();if(state.openId===id)renderDetail(CATALOG.find(x=>x.id===id));
  renderAgent();noteInference();
}
function addToCart(id){
  if(!state.cart.has(id)){state.cart.add(id);log('cart',id);noteEvent(state.events[state.events.length-1]);toast('🛒 已加入购物车');}
  else{toast('已在购物车中');}
  renderCart();renderAgent();noteInference();
}
function removeFromCart(id){state.cart.delete(id);log('removeCart',id);noteEvent(state.events[state.events.length-1]);renderCart();renderAgent();noteInference();}
function clearCart(){if(state.cart.size===0)return;[...state.cart].forEach(id=>log('removeCart',id));state.cart.clear();renderCart();renderAgent();noteInference();toast('购物车已清空');}
function openCart(){ if(state.sheet==='detail') state.sheet=null; renderCart(); state.sheet='cart'; updateSheets(); }
function closeCart(){ if(state.sheet==='cart'){ state.sheet=null; updateSheets(); } }
function checkout(){
  if(state.cart.size===0){toast('购物车是空的');return;}
  [...state.cart].forEach(id=>log('purchase',id));
  pushThought(`💳 提交订单（${state.cart.size}件）· 购买链路完成`,'act');
  state.cart.clear();renderCart();renderAgent();noteInference();
  closeCart();toast('🎉 订单提交成功！');
}
function doSearch(){
  const q=document.getElementById('search').value.trim();
  if(q){state.search=q;log('search',null,{q});noteEvent(state.events[state.events.length-1]);renderFeed();renderAgent();noteInference();
    document.getElementById('body').scrollTo({top:0,behavior:'smooth'});}
  else{state.search='';renderFeed();}
}
let searchTimer=null;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const q=e.target.value.trim();state.search=q;
    if(q){log('search',null,{q});noteEvent(state.events[state.events.length-1]);renderAgent();noteInference();}
    renderFeed();
  },500);
});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

/* ============================================================
   10. 心跳 —— 让衰减与意图随时间实时刷新
   ============================================================ */
setInterval(renderAgent,700);

/* init */
renderChips();renderQuick();renderFeed();renderCart();renderAgent();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeSheets(); });
pushThought('Agent 已就绪，正在观察用户行为…','inf');
</script>
</body>
</html>
